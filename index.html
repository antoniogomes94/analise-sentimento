<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Análise de Sentimentos</title>
  <link rel="stylesheet" href="css/style.css">
  <script>
    (function () {
      try {
        var stored = localStorage.getItem('theme');
        var theme = (stored === 'light' || stored === 'dark')
          ? stored
          : (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.dataset.theme = theme;
      } catch (e) {
        document.documentElement.dataset.theme = 'light';
      }
    })();
  </script>
</head>
<body>
  <div class="container">

    <!-- Header -->
    <header>
      <button id="theme-toggle" class="theme-toggle" type="button"
              aria-label="Alternar tema claro/escuro" aria-pressed="false">
        <span class="theme-toggle__icon" aria-hidden="true">☾</span>
      </button>
      <h1>Análise de Sentimentos</h1>
      <p class="subtitle">Análise linguística com IA</p>
    </header>

    <!-- Main form card -->
    <main id="main-content">
      <div class="card">

        <!-- Model selector (custom dropdown) -->
        <div class="field-group">
          <label for="model-trigger">Modelo</label>
          <div class="model-selector" id="model-selector">
            <button class="model-trigger" id="model-trigger" aria-haspopup="listbox" aria-expanded="false">
              <span class="model-trigger__label" id="model-trigger-label">Selecione um modelo</span>
              <span class="model-trigger__arrow" aria-hidden="true">▾</span>
            </button>
            <ul class="model-dropdown" id="model-dropdown" role="listbox" aria-label="Selecione o modelo" hidden>
              <!-- Populated dynamically by models.js -->
            </ul>
          </div>
          <!-- Error message when no models are configured -->
          <p class="field-hint" id="model-hint"></p>
        </div>

        <!-- API Key (visible only for models that require one and don't have it pre-configured) -->
        <div class="field-group" id="api-key-group" hidden>
          <label for="api-key-input"><span id="api-key-label">Chave da API</span></label>
          <input
            type="password"
            id="api-key-input"
            class="text-input"
            placeholder="Cole sua chave aqui"
            autocomplete="off"
            spellcheck="false"
          >
          <p class="field-hint">
            Salva apenas no seu navegador (localStorage). Nunca é enviada a nenhum servidor além da API do provedor.
          </p>
        </div>

        <!-- Text input -->
        <div class="field-group">
          <label for="text-input">Texto para análise</label>
          <textarea
            id="text-input"
            rows="7"
            placeholder="Cole aqui o texto para análise de sentimentos..."
            spellcheck="true"
            lang="pt-BR"
          ></textarea>
        </div>

        <!-- Analyze button -->
        <button class="btn-analyze" id="btn-analyze" disabled>
          <span class="btn-analyze__text">Analisar</span>
          <span class="btn-analyze__spinner" aria-hidden="true" hidden></span>
        </button>

      </div>

      <!-- Result section (hidden until first result) -->
      <div class="card result-card" id="result-section" hidden>
        <div class="result-header">
          <h2>Resultado</h2>
          <div class="result-meta" id="result-meta"></div>
        </div>

        <!-- Visual sentiment bars -->
        <div class="sentiments-grid" id="sentiments-grid"></div>

        <!-- Dominant / summary row -->
        <div class="result-summary" id="result-summary"></div>

        <!-- Raw JSON collapsible -->
        <details class="raw-json">
          <summary>JSON bruto</summary>
          <pre id="raw-json-output"></pre>
        </details>
      </div>

      <!-- Error section (hidden until error) -->
      <div class="card error-card" id="error-section" hidden>
        <h2>Erro</h2>
        <p id="error-message"></p>
      </div>

    </main>

  </div>

  <!-- Script load order matters: config -> models -> api-client -> app -->
  <script src="models.config.js"></script>
  <script>
    // Carrega models.config.local.js se existir (override silencioso, sem erro 404)
    (async () => {
      try {
        const res = await fetch('models.config.local.js', { cache: 'no-store' });
        if (res.ok) {
          new Function(await res.text())();
        }
      } catch (_) { /* arquivo ausente: usa config padrão */ }

      for (const src of ['js/theme.js', 'js/models.js', 'js/api-client.js', 'js/app.js']) {
        await new Promise((resolve, reject) => {
          const s = document.createElement('script');
          s.src = src;
          s.onload = resolve;
          s.onerror = reject;
          document.body.appendChild(s);
        });
      }
    })();
  </script>
</body>
</html>
